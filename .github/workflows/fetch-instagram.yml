name: Fetch Instagram Posts

on:
    # TODO: Instagram設定完了後にscheduleを有効化する
    # schedule:
    #     # Run daily at 09:00 JST (00:00 UTC)
    #     - cron: '0 0 * * *'
    workflow_dispatch: # Allow manual trigger (Instagram設定完了後のテスト用)

permissions:
    contents: write

concurrency:
    group: "instagram-fetch"
    cancel-in-progress: true

jobs:
    fetch:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Fetch Instagram posts
              env:
                  INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
                  INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
              run: node scripts/fetch-instagram.mjs

            - name: Check for changes
              id: changes
              run: |
                  git add public/images/instagram/ src/data/instagram.json
                  if git diff --cached --quiet; then
                      echo "changed=false" >> "$GITHUB_OUTPUT"
                  else
                      echo "changed=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Commit and push
              if: steps.changes.outputs.changed == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git commit -m "chore: update Instagram feed data"
                  git push
